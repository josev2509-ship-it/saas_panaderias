<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestionar Conduces</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            padding: 20px;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 25px;
        }

        .barra-superior {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn-azul { background: #2563eb; }
        .btn-verde { background: #16a34a; }
        .btn-rojo { background: #dc2626; }
        .btn-gris { background: #6b7280; }
        .btn-morado { background: #7c3aed; }

        .filtros {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            align-items: center;
        }

        input {
            padding: 10px;
            min-width: 160px;
        }

        .acciones {
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 7px;
            font-size: 13px;
            text-align: left;
        }

        th {
            background: #e5e7eb;
        }
    </style>
</head>

<body>

<div class="barra-superior">
    <a href="/" class="btn btn-gris">⬅ Volver al inicio</a>
</div>

<h2>📋 Gestionar Conduces</h2>

<form method="GET" class="filtros">
    <input type="text" name="codigo_centro" placeholder="Código centro" value="{{ codigo_centro }}">
    <input type="date" name="fecha_desde" id="fecha_desde" value="{{ fecha_desde }}">
    <input type="date" name="fecha_hasta" id="fecha_hasta" value="{{ fecha_hasta }}">

    <button type="submit" class="btn btn-azul">Buscar</button>

    <button type="button" class="btn btn-morado" onclick="generarRelacionGeneral()">
        📊 Relación general PDF
    </button>
</form>

<form method="POST" action="/acciones-conduces/">
    {% csrf_token %}

    <div class="acciones">
        <button type="submit" name="accion" value="relacion_diaria_pdf" class="btn btn-verde">
            📄 Relación diaria PDF
        </button>

        <button type="submit" name="accion" value="pdf_ver" class="btn btn-azul">
            👁️ Ver PDF
        </button>

        <button type="submit" name="accion" value="pdf_descargar" class="btn btn-gris">
            ⬇️ Descargar PDF
        </button>

        <button type="submit" name="accion" value="anular" class="btn btn-rojo">
            ❌ Anular
        </button>

        <button type="submit" name="accion" value="entregado" class="btn btn-verde">
            ✔️ Marcar entregado
        </button>
    </div>

    <table>
        <thead>
            <tr>
                <th><input type="checkbox" onclick="toggleAll(this)"></th>
                <th>Número</th>
                <th>Fecha</th>
                <th>Centro</th>
                <th>Código</th>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>
            {% for c in conduces %}
            <tr>
                <td><input type="checkbox" name="conduces" value="{{ c.id }}"></td>
                <td>{{ c.numero }}</td>
                <td>{{ c.fecha }}</td>
                <td>{{ c.centro.nombre }}</td>
                <td>{{ c.centro.codigo }}</td>
                <td>{{ c.producto }}</td>
                <td>{{ c.cantidad }}</td>
                <td>{{ c.estado }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="8">No hay resultados</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</form>

<script>
function toggleAll(source) {
    const checkboxes = document.querySelectorAll('input[name="conduces"]');
    checkboxes.forEach(cb => cb.checked = source.checked);
}

function generarRelacionGeneral() {
    const desde = document.getElementById("fecha_desde").value;
    const hasta = document.getElementById("fecha_hasta").value;

    if (!desde || !hasta) {
        alert("Para generar la relación general debes seleccionar fecha desde y fecha hasta.");
        return;
    }

    const url = `/relacion-general/pdf/?fecha_inicio=${desde}&fecha_fin=${hasta}`;
    window.open(url, "_blank");
}
</script>

</body>
</html>
